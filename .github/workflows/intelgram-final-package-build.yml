name: IntelGram Final Release Publish

on:
  pull_request:
    branches:
      - codex/ayugram-local-collectibles-20260712
  workflow_dispatch:

concurrency:
  group: intelgram-final-release-publish
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

env:
  SOURCE_TAG: v6.7.8
  SOURCE_COMMIT: b25513a06ff88be0b3f4c928252b56c3da39cec7
  PATCH_SHA256: 8a2ec8976b38591e1dc3a20eb7cc68e21b793d82497331a8001ff28d3c9c0826
  WINDOWS_RUN_ID: "29315136213"
  CROSS_PLATFORM_RUN_ID: "29305700661"
  RELEASE_TAG: intelgram-v6.7.8-final-29315136213

jobs:
  release:
    name: Publish final IntelGram release
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Download successful Windows package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          gh run download "$WINDOWS_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name IntelGram-Windows-x64 \
            --dir release-assets/IntelGram-Windows-x64

      - name: Download successful macOS and Linux packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          for name in IntelGram-macOS-Apple-Silicon IntelGram-Linux-x64; do
            gh run download "$CROSS_PLATFORM_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$name" \
              --dir "release-assets/$name"
          done

      - name: Verify and publish permanent release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euxo pipefail
          mkdir -p final-assets
          find release-assets -type f -size +0c -exec cp {} final-assets/ \;
          cp intelgram-local-profile-render-overrides.patch final-assets/
          cp build_intelgram_branding.py final-assets/
          test -s final-assets/IntelGram-macOS-Apple-Silicon.dmg
          test -s final-assets/IntelGram-macOS-Apple-Silicon.zip
          test -s final-assets/IntelGram-Windows-x64.zip
          test -s final-assets/IntelGram-Linux-x64.tar.gz
          test -s final-assets/IntelGram-macOS-validation.txt
          test -s final-assets/IntelGram-Windows-validation.txt
          test -s final-assets/IntelGram-Linux-validation.txt
          mapfile -t assets < <(
            find final-assets -maxdepth 1 -type f -size +0c -print | sort
          )
          test "${#assets[@]}" -gt 0
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"; then
            gh release upload "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              "${assets[@]}"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$TARGET_SHA" \
              "${assets[@]}"
          fi
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --latest \
            --target "$TARGET_SHA" \
            --title "IntelGram v6.7.8 - macOS, Windows, Linux" \
            --notes "IntelGram is built from official AyuGram Desktop v6.7.8 with client-render-only local display name, UID, primary and other usernames, anonymous number, and collectible gifts. It includes the collection-first picker, native Collection #Number tooltip, original-username reference, and credits to fool. No Telegram profile, username, UID, phone number, gift ownership, or other account mutation is included."
