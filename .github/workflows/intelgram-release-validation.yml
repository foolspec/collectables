name: IntelGram Release Validation

on:
  release:
    types:
      - published
      - edited
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

env:
  SOURCE_PATCH_SHA256: 9b756a29cfc413fdff6d23dfa5781cc3085d1bff1637e1b0abc8bce8f1562895
  RELEASE_PATCH_SHA256: 9b756a29cfc413fdff6d23dfa5781cc3085d1bff1637e1b0abc8bce8f1562895

jobs:
  verify-release:
    name: Verify published packages
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify source patch
        run: |
          set -euo pipefail
          test "$(sha256sum intelgram-local-profile-render-overrides.patch | awk '{print $1}')" = "$SOURCE_PATCH_SHA256"
          test "$(sha256sum ayugram-local-profile-render-overrides.patch | awk '{print $1}')" = "$SOURCE_PATCH_SHA256"
          cmp intelgram-local-profile-render-overrides.patch ayugram-local-profile-render-overrides.patch

      - name: Verify latest release and package digests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/latest")"
          tag="$(jq -r '.tag_name' <<<"$release")"
          test "$(jq -r '.draft' <<<"$release")" = "false"
          test "$(jq -r '.prerelease' <<<"$release")" = "false"
          test "$(jq -r '.name' <<<"$release")" = "IntelGram v6.7.8 - macOS, Windows, Linux"

          required_assets=(
            IntelGram-macOS-Apple-Silicon.dmg
            IntelGram-macOS-Apple-Silicon.zip
            IntelGram-Windows-x64.zip
            IntelGram-Linux-x64.tar.gz
            IntelGram-macOS-sha256.txt
            IntelGram-Windows-sha256.txt
            IntelGram-Linux-sha256.txt
            IntelGram-macOS-validation.txt
            IntelGram-Windows-validation.txt
            IntelGram-Linux-validation.txt
            launch-macos.log
            launch-windows.log
            launch-windows-error.log
            launch-linux.log
            intelgram-local-profile-render-overrides.patch
            ayugram-local-profile-render-overrides.patch
            build_intelgram_branding.py
            IntelGram-branding-assets.zip
          )
          for asset in "${required_assets[@]}"; do
            jq -e --arg name "$asset" '.assets[] | select(.name == $name)' <<<"$release" >/dev/null
          done

          download="$(mktemp -d)"
          trap 'rm -rf "$download"' EXIT
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir "$download"

          (
            cd "$download"
            sed -i 's/\r$//' IntelGram-*-sha256.txt IntelGram-*-validation.txt
            sha256sum -c IntelGram-macOS-sha256.txt
            sha256sum -c IntelGram-Windows-sha256.txt
            sha256sum -c IntelGram-Linux-sha256.txt
            test "$(sha256sum intelgram-local-profile-render-overrides.patch | awk '{print $1}')" = "$RELEASE_PATCH_SHA256"
            test "$(sha256sum ayugram-local-profile-render-overrides.patch | awk '{print $1}')" = "$RELEASE_PATCH_SHA256"
            cmp intelgram-local-profile-render-overrides.patch ayugram-local-profile-render-overrides.patch
            for validation in IntelGram-*-validation.txt; do
              grep -F "Patch: $SOURCE_PATCH_SHA256" "$validation"
              grep -F "Launch smoke test: PASS" "$validation"
            done
          )

          verify_package_digest() {
            local name="$1"
            local checksum="$2"
            local expected
            local actual
            expected="$(awk -v name="$name" '$2 == name { print $1 }' "$download/$checksum")"
            test -n "$expected"
            actual="$(jq -r --arg name "$name" '.assets[] | select(.name == $name) | .digest' <<<"$release")"
            test "$actual" = "sha256:$expected"
          }

          verify_package_digest IntelGram-macOS-Apple-Silicon.dmg IntelGram-macOS-sha256.txt
          verify_package_digest IntelGram-macOS-Apple-Silicon.zip IntelGram-macOS-sha256.txt
          verify_package_digest IntelGram-Windows-x64.zip IntelGram-Windows-sha256.txt
          verify_package_digest IntelGram-Linux-x64.tar.gz IntelGram-Linux-sha256.txt

          echo "Verified release $tag with all required IntelGram packages."
