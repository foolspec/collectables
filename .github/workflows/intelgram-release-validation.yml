name: IntelGram Release Validation

on:
  release:
    types:
      - published
      - edited
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

env:
  SOURCE_PATCH_SHA256: 8790874ca989a17ebdb455aaf5fed1d51312e5b41425c44e99193ac48e4c425c
  RELEASE_PATCH_SHA256: 5b12d98645e17587b842356c56d55cdc7dc9210d5466e46993a5780dab5f5ae1

jobs:
  verify-release:
    name: Verify published packages
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify source patch
        run: |
          set -euo pipefail
          test "$(sha256sum intelgram-local-profile-render-overrides.patch | awk '{print $1}')" = "$SOURCE_PATCH_SHA256"
          test "$(sha256sum ayugram-local-profile-render-overrides.patch | awk '{print $1}')" = "$SOURCE_PATCH_SHA256"
          cmp intelgram-local-profile-render-overrides.patch ayugram-local-profile-render-overrides.patch

      - name: Verify latest release and package digests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/latest")"
          test "$(jq -r '.draft' <<<"$release")" = "false"
          test "$(jq -r '.prerelease' <<<"$release")" = "false"
          test "$(jq -r '.name' <<<"$release")" = "IntelGram v6.7.8 - macOS, Windows, Linux"

          verify_asset() {
            local name="$1"
            local expected="$2"
            local actual
            actual="$(jq -r --arg name "$name" '.assets[] | select(.name == $name) | .digest' <<<"$release")"
            test "$actual" = "sha256:$expected"
          }

          verify_asset "IntelGram-macOS-Apple-Silicon.dmg" "3ce2fa367ad163377b09ac4efb5148190e04e3cb89f54dafa6ff777a32dd0b0d"
          verify_asset "IntelGram-macOS-Apple-Silicon.zip" "2a822877392f6d207671f1dad01faf1dc1f7bf502843c5183347c5ce21126a36"
          verify_asset "IntelGram-Windows-x64.zip" "7431e9ee35c089856638f75aa26184a08041d404322118e313330b9fbad2bee6"
          verify_asset "IntelGram-Linux-x64.tar.gz" "f940160541dc268dec285d7ff2f7041d2c6fe00c0469e1dbb173c8fe5d2cd6ea"
          verify_asset "intelgram-local-profile-render-overrides.patch" "$RELEASE_PATCH_SHA256"
          verify_asset "ayugram-local-profile-render-overrides.patch" "$RELEASE_PATCH_SHA256"

          for asset in \
            IntelGram-macOS-sha256.txt \
            IntelGram-macOS-validation.txt \
            IntelGram-Windows-sha256.txt \
            IntelGram-Windows-validation.txt \
            IntelGram-Linux-sha256.txt \
            IntelGram-Linux-validation.txt \
            launch-macos.log \
            launch-linux.log; do
            jq -e --arg name "$asset" '.assets[] | select(.name == $name)' <<<"$release" >/dev/null
          done

          echo "Verified release $(jq -r '.tag_name' <<<"$release") with all required IntelGram packages."
