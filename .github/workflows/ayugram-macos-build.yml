name: AyuGram macOS Build

on:
  push:
    branches:
      - codex/ayugram-local-collectibles-20260712
  workflow_dispatch:

concurrency:
  group: ayugram-local-collectibles-macos-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build patched AyuGram v6.7.8
    runs-on: macos-26
    timeout-minutes: 350
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      CMAKE_BUILD_PARALLEL_LEVEL: "3"
    steps:
      - name: Check out build inputs
        uses: actions/checkout@v4

      - name: Verify runner
        shell: bash
        run: |
          set -euxo pipefail
          sw_vers
          uname -a
          xcode-select -p
          xcodebuild -version
          cmake --version
          ninja --version
          df -h

      - name: Install documented build tools
        shell: bash
        run: |
          set -euxo pipefail
          brew install automake wget pkg-config gnu-tar nasm meson

      - name: Clone official AyuGram v6.7.8 with submodules
        shell: bash
        run: |
          set -euxo pipefail
          git clone --recursive --branch v6.7.8 --single-branch https://github.com/AyuGram/AyuGramDesktop.git tdesktop
          git -C tdesktop rev-parse HEAD
          git -C tdesktop describe --tags --exact-match
          git -C tdesktop submodule status --recursive
          df -h

      - name: Restore prepared macOS dependencies
        uses: actions/cache@v4
        with:
          path: Libraries
          key: ayugram-v6.7.8-macos26-libraries-v1

      - name: Apply and validate render-only patch
        shell: bash
        run: |
          set -euxo pipefail
          PATCH="$GITHUB_WORKSPACE/ayugram-local-profile-render-overrides.patch"
          EXPECTED_SHA256="d02183f62c2eca6bd2355c5427b958755f24e52399c84dcdedace89d3fbdea29"
          ACTUAL_SHA256="$(shasum -a 256 "$PATCH" | awk '{print $1}')"
          test "$ACTUAL_SHA256" = "$EXPECTED_SHA256"
          git -C tdesktop apply --check "$PATCH"
          git -C tdesktop apply "$PATCH"
          git -C tdesktop diff --check
          if git -C tdesktop diff --no-ext-diff | grep -E 'updateProfile|updateUsername|MTPaccount_|MTPusers_|account\.update|users\..*update'; then
            echo "Unexpected Telegram profile/network mutation reference in patch."
            exit 1
          fi
          SETTINGS_FILE="tdesktop/Telegram/SourceFiles/ayu/ui/settings/settings_other.cpp"
          grep -n 'ayu_LocalProfileHeader' "$SETTINGS_FILE"
          grep -n 'ayu_LocalProfileNameEnabled' "$SETTINGS_FILE"
          grep -n 'ayu_LocalProfileUsernameEnabled' "$SETTINGS_FILE"
          grep -n 'ayu_LocalProfilePhoneEnabled' "$SETTINGS_FILE"
          grep -n 'ayu_LocalProfileGiftEnabled' "$SETTINGS_FILE"
          grep -n 'ayu_LocalProfileGift' "$SETTINGS_FILE"
          grep -n 'ayu_LocalProfileGifts' "$SETTINGS_FILE"
          grep -n 'localProfileNameEnabled' tdesktop/Telegram/SourceFiles/ayu/ayu_settings.cpp
          grep -n 'localProfileUsernameEnabled' tdesktop/Telegram/SourceFiles/ayu/ayu_settings.cpp
          grep -n 'localProfilePhoneEnabled' tdesktop/Telegram/SourceFiles/ayu/ayu_settings.cpp
          grep -n 'localProfileGiftEnabled' tdesktop/Telegram/SourceFiles/ayu/ayu_settings.cpp
          grep -n 'MTPpayments_GetUniqueStarGift' tdesktop/Telegram/SourceFiles/ayu/ui/utils/ayu_profile_values.cpp
          grep -n 'ResolveAndShowUniqueGift' tdesktop/Telegram/SourceFiles/info/profile/info_profile_top_bar.cpp
          git -C tdesktop diff --stat

      - name: Prepare AyuGram macOS dependencies
        shell: bash
        run: |
          set -euxo pipefail
          cd tdesktop
          ./Telegram/build/prepare/mac.sh
          df -h

      - name: Configure Release project
        shell: bash
        run: |
          set -euxo pipefail
          cd tdesktop/Telegram
          ./configure.sh             -D TDESKTOP_API_ID=2040             -D TDESKTOP_API_HASH=b18441a1ff607e10a989891a5462e627
          test -d ../out
          df -h

      - name: Build Release application
        shell: bash
        run: |
          set -euxo pipefail
          cd tdesktop/Telegram
          cmake --build ../out --config Release --target Telegram --parallel 3
          df -h

      - name: Locate and inspect application
        shell: bash
        run: |
          set -euxo pipefail
          APP_PATH="$(find "$GITHUB_WORKSPACE/tdesktop/out/Release" -maxdepth 2 -type d -name '*.app' | sed -n '1p')"
          if [[ -z "$APP_PATH" || ! -d "$APP_PATH" ]]; then
            find "$GITHUB_WORKSPACE/tdesktop/out" -maxdepth 5 -type d -name '*.app' -print
            exit 1
          fi
          BUNDLE_EXECUTABLE="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Contents/Info.plist")"
          APP_BINARY="$APP_PATH/Contents/MacOS/$BUNDLE_EXECUTABLE"
          test -x "$APP_BINARY"
          {
            echo "Source tag: v6.7.8"
            echo "Source commit: $(git -C "$GITHUB_WORKSPACE/tdesktop" rev-parse HEAD)"
            echo "Patch SHA-256: $(shasum -a 256 "$GITHUB_WORKSPACE/ayugram-local-profile-render-overrides.patch" | awk '{print $1}')"
            echo "Application: $APP_PATH"
            echo "Executable: $BUNDLE_EXECUTABLE"
            echo "Bundle identifier: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Contents/Info.plist")"
            echo "Architectures: $(lipo -archs "$APP_BINARY")"
            echo "Binary: $(file "$APP_BINARY")"
          } | tee "$GITHUB_WORKSPACE/build-metadata.txt"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "BUNDLE_EXECUTABLE=$BUNDLE_EXECUTABLE" >> "$GITHUB_ENV"

      - name: Verify Local profile settings in built application
        shell: bash
        run: |
          set -euxo pipefail
          SETTINGS_FILE="$GITHUB_WORKSPACE/tdesktop/Telegram/SourceFiles/ayu/ui/settings/settings_other.cpp"
          LANG_FILE="$GITHUB_WORKSPACE/tdesktop/Telegram/Resources/langs/lang.strings"
          GENERATED_LANG_DIR="$GITHUB_WORKSPACE/tdesktop/out/Telegram/gen"
          APP_BINARY="$APP_PATH/Contents/MacOS/$BUNDLE_EXECUTABLE"
          test -x "$APP_BINARY"
          {
            echo "Settings -> Other source wiring:"
            grep -n 'ayu_LocalProfileHeader' "$SETTINGS_FILE"
            grep -n 'ayu_LocalProfileNameEnabled' "$SETTINGS_FILE"
            grep -n 'ayu_LocalProfileUsernameEnabled' "$SETTINGS_FILE"
            grep -n 'ayu_LocalProfileUsername' "$SETTINGS_FILE"
            grep -n 'ayu_LocalProfileUsernames' "$SETTINGS_FILE"
            grep -n 'ayu_LocalProfilePhoneEnabled' "$SETTINGS_FILE"
            grep -n 'ayu_LocalProfilePhone' "$SETTINGS_FILE"
            grep -n 'ayu_LocalProfileGiftEnabled' "$SETTINGS_FILE"
            grep -n 'ayu_LocalProfileGift' "$SETTINGS_FILE"
            grep -n 'ayu_LocalProfileGifts' "$SETTINGS_FILE"
            echo "Generated translation keys:"
          } | tee "$GITHUB_WORKSPACE/validation.txt"
          for KEY in \
            ayu_LocalProfileHeader \
            ayu_LocalProfileNameEnabled \
            ayu_LocalProfileName \
            ayu_LocalProfileUsernameEnabled \
            ayu_LocalProfileUsername \
            ayu_LocalProfileUsernames \
            ayu_LocalProfilePhoneEnabled \
            ayu_LocalProfilePhone \
            ayu_LocalProfileGiftEnabled \
            ayu_LocalProfileGift \
            ayu_LocalProfileGifts \
            ayu_LocalProfileGiftBrowse \
            ayu_LocalProfileGiftDescription \
            ayu_LocalProfileDescription; do
            grep -n "\"$KEY\"" "$LANG_FILE" | tee -a "$GITHUB_WORKSPACE/validation.txt"
            grep -R -n -m 1 "$KEY" "$GENERATED_LANG_DIR" | tee -a "$GITHUB_WORKSPACE/validation.txt"
            echo "Generated and compiled translation key: $KEY" | tee -a "$GITHUB_WORKSPACE/validation.txt"
          done
          echo "Built bundle verification: PASS (universal app, Settings wiring, generated translations)" | tee -a "$GITHUB_WORKSPACE/validation.txt"

      - name: Ad-hoc sign and launch smoke test
        if: ${{ always() && env.APP_PATH != '' }}
        shell: bash
        run: |
          set -euxo pipefail
          PACKAGE_ROOT="$RUNNER_TEMP/ayugram-local-profile-package"
          PACKAGE_APP="$PACKAGE_ROOT/AyuGram Local Profile.app"
          TEST_WORKDIR="$RUNNER_TEMP/ayugram-local-profile-smoke"
          rm -rf "$PACKAGE_ROOT" "$TEST_WORKDIR"
          mkdir -p "$PACKAGE_ROOT" "$TEST_WORKDIR"
          ditto "$APP_PATH" "$PACKAGE_APP"
          xattr -cr "$PACKAGE_APP"
          codesign --force --deep --sign - "$PACKAGE_APP"
          codesign --verify --deep --strict --verbose=2 "$PACKAGE_APP"
          APP_BINARY="$PACKAGE_APP/Contents/MacOS/$BUNDLE_EXECUTABLE"
          "$APP_BINARY" -many -workdir "$TEST_WORKDIR" > "$GITHUB_WORKSPACE/launch.log" 2>&1 &
          APP_PID=$!
          sleep 12
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "Launch smoke test: PASS (isolated empty workdir, pid $APP_PID)" | tee -a "$GITHUB_WORKSPACE/validation.txt"
            kill "$APP_PID"
            wait "$APP_PID" || true
          else
            echo "Launch smoke test: FAIL"
            cat "$GITHUB_WORKSPACE/launch.log"
            exit 1
          fi
          echo "PACKAGE_APP=$PACKAGE_APP" >> "$GITHUB_ENV"

      - name: Package application
        if: ${{ always() && env.APP_PATH != '' }}
        shell: bash
        run: |
          set -euxo pipefail
          PACKAGE_APP="${PACKAGE_APP:-$RUNNER_TEMP/ayugram-local-profile-package/AyuGram Local Profile.app}"
          test -d "$PACKAGE_APP"
          ln -s /Applications "$(dirname "$PACKAGE_APP")/Applications"
          ditto -c -k --sequesterRsrc --keepParent "$PACKAGE_APP" "$GITHUB_WORKSPACE/AyuGram-Local-Profile-macOS-universal.zip"
          hdiutil create             -volname "AyuGram Local Profile"             -srcfolder "$(dirname "$PACKAGE_APP")"             -ov             -format UDZO             "$GITHUB_WORKSPACE/AyuGram-Local-Profile-macOS-universal.dmg"
          shasum -a 256             "$GITHUB_WORKSPACE/AyuGram-Local-Profile-macOS-universal.dmg"             "$GITHUB_WORKSPACE/AyuGram-Local-Profile-macOS-universal.zip"             | tee "$GITHUB_WORKSPACE/artifact-sha256.txt"
          ls -lh             "$GITHUB_WORKSPACE/AyuGram-Local-Profile-macOS-universal.dmg"             "$GITHUB_WORKSPACE/AyuGram-Local-Profile-macOS-universal.zip"

      - name: Upload runnable application
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-Local-Profile-macOS-universal
          path: |
            AyuGram-Local-Profile-macOS-universal.dmg
            AyuGram-Local-Profile-macOS-universal.zip
            artifact-sha256.txt
            build-metadata.txt
            validation.txt
            launch.log
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
