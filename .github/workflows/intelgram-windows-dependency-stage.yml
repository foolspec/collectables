name: IntelGram Windows Dependency Stage

on:
  workflow_call:
    inputs:
      cache_key:
        required: true
        type: string
      restore_key:
        required: false
        default: ""
        type: string
      stages:
        required: false
        default: ""
        type: string
      completion_marker:
        required: true
        type: string
      stage_timeout_minutes:
        required: false
        default: 300
        type: number

jobs:
  prepare:
    runs-on: windows-2025
    timeout-minutes: 355
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: "3"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Configure Visual Studio build environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone official source
        shell: pwsh
        run: |
          git clone --recursive --branch v6.7.8 --single-branch https://github.com/AyuGram/AyuGramDesktop.git tdesktop
          if ((git -C tdesktop rev-parse HEAD) -ne "b25513a06ff88be0b3f4c928252b56c3da39cec7") { throw "Unexpected source commit" }

      - name: Restore accumulated dependencies
        id: dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            Libraries
            ThirdParty
            ${{ inputs.completion_marker }}
          key: ${{ inputs.cache_key }}
          restore-keys: ${{ inputs.restore_key }}

      - name: Prepare dependency stage
        shell: cmd
        timeout-minutes: ${{ inputs.stage_timeout_minutes }}
        run: |
          if exist "${{ inputs.completion_marker }}" (
            echo Dependency stage is already complete.
            exit /b 0
          )
          if "${{ inputs.stages }}"=="" (
            call tdesktop\Telegram\build\prepare\win.bat silent
          ) else (
            call tdesktop\Telegram\build\prepare\win.bat silent ${{ inputs.stages }}
          )
          if %errorlevel% neq 0 exit /b %errorlevel%
          type nul > "${{ inputs.completion_marker }}"

      - name: Save accumulated dependencies
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            Libraries
            ThirdParty
            ${{ inputs.completion_marker }}
          key: ${{ inputs.cache_key }}
name: IntelGram Windows Dependency Stage

on:
  workflow_call:
    inputs:
      cache_key:
        required: true
        type: string
      restore_key:
        required: false
        default: ""
        type: string
      stages:
        required: false
        default: ""
        type: string

jobs:
  prepare:
    runs-on: windows-2025
    timeout-minutes: 355
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: "3"
    steps:
      - name: Configure Visual Studio build environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone official source
        shell: pwsh
        run: |
          git clone --recursive --branch v6.7.8 --single-branch https://github.com/AyuGram/AyuGramDesktop.git tdesktop
          if ((git -C tdesktop rev-parse HEAD) -ne "b25513a06ff88be0b3f4c928252b56c3da39cec7") { throw "Unexpected source commit" }

      - name: Restore accumulated dependencies
        id: dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            Libraries
            ThirdParty
          key: ${{ inputs.cache_key }}
          restore-keys: ${{ inputs.restore_key }}

      - name: Prepare dependency stage
        if: steps.dependencies.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          if "${{ inputs.stages }}"=="" (
            call tdesktop\Telegram\build\prepare\win.bat
          ) else (
            call tdesktop\Telegram\build\prepare\win.bat ${{ inputs.stages }}
          )

      - name: Save accumulated dependencies
        if: steps.dependencies.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            Libraries
            ThirdParty
          key: ${{ inputs.cache_key }}
