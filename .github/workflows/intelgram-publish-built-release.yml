name: Publish Completed IntelGram Build

on:
  workflow_dispatch:
    inputs:
      macos_run_id:
        description: Successful macOS IntelGram build run ID
        required: true
      windows_run_id:
        description: Successful Windows IntelGram build run ID
        required: true
      linux_run_id:
        description: Successful Linux IntelGram build run ID
        required: true
      release_tag:
        description: New permanent release tag
        required: true

permissions:
  actions: read
  contents: write

jobs:
  release:
    name: Publish completed build artifacts
    runs-on: ubuntu-24.04
    env:
      MACOS_RUN_ID: ${{ inputs.macos_run_id }}
      WINDOWS_RUN_ID: ${{ inputs.windows_run_id }}
      LINUX_RUN_ID: ${{ inputs.linux_run_id }}
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download verified macOS package
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.MACOS_RUN_ID }}
          name: IntelGram-macOS-Apple-Silicon
          path: release-assets

      - name: Download verified Windows package
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.WINDOWS_RUN_ID }}
          name: IntelGram-Windows-x64
          path: release-assets

      - name: Download verified Linux package
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.LINUX_RUN_ID }}
          name: IntelGram-Linux-x64
          path: release-assets

      - name: Publish permanent release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          cp intelgram-local-profile-render-overrides.patch release-assets/
          cp intelgram-local-profile-render-overrides.patch release-assets/ayugram-local-profile-render-overrides.patch
          cp build_intelgram_branding.py release-assets/
          cp validate_intelgram_patch.py release-assets/
          python3 -m zipfile -c release-assets/IntelGram-branding-assets.zip branding/icons generate_intelgram_character_icons.py
          for log in launch-macos.log launch-windows.log launch-windows-error.log launch-linux.log; do
            if [[ -f "release-assets/$log" && ! -s "release-assets/$log" ]]; then
              printf 'IntelGram produced no console output and remained running for the launch smoke-test window.\n' > "release-assets/$log"
            fi
          done
          find release-assets -maxdepth 1 -type f -print -exec ls -lh {} \;
          for required in \
            IntelGram-macOS-Apple-Silicon.dmg \
            IntelGram-macOS-Apple-Silicon.zip \
            IntelGram-Windows-x64.zip \
            IntelGram-Linux-x64.tar.gz \
            IntelGram-macOS-validation.txt \
            IntelGram-Windows-validation.txt \
            IntelGram-Linux-validation.txt; do
            test -s "release-assets/$required"
          done
          mapfile -d '' RELEASE_ASSETS < <(find release-assets -maxdepth 1 -type f ! -empty -print0)
          test "${#RELEASE_ASSETS[@]}" -gt 0
          cat > release-notes.md <<'EOF'
          ## IntelGram v6.7.8 Vault Suite

          This release contains launch-tested IntelGram packages for macOS Apple Silicon, Windows x64, and Linux x64.

          ### Main features

          - Universal local full-text search across received messages, links, media metadata, and filenames, with a unified view across signed-in accounts.
          - Chat timelines with jump-to-date, statistics, compact media history, saved moments, and locally observed edit/deletion history.
          - Smart folders, private contact notes with reminders and history, opt-in public identity snapshots, local rules, and anti-spam review.
          - Per-chat local tags, priority, download mode, read reminders, local-only draft preference, and local notification muting.
          - Theme Studio with Windows 93, Terminal, Classic Telegram, AMOLED, custom theme import, and IntelGram icon choices.
          - Selected-message and chat/account exports to HTML, PDF, Markdown, JSON, and ZIP, plus AES-256-GCM Frozen Account Backup with permitted cached media.
          - Client-render-only display name, UID, primary and other usernames, anonymous number, bio, and profile photo for your own account.
          - Local profile cloning from an already-loaded peer by UID, including badges, emoji status, and personal channel, plus cached-peer search by UID or a phone number already visible to your account.
          - Telegram's familiar inline username-status presentation for the local username editor, without a server-side username check.
          - A native in-app collectible browser with Telegram's read-only live catalog, exact numbered gifts, native previews and details, and Telegram, Getgems, and TON link input.
          - A visual collection gallery and scrollable exact-item gallery that selects collectibles without leaving IntelGram.
          - A featured local collectible backdrop and up to six pinned local collectibles around your avatar.
          - Local and cloned collectible details present **Gifted to** and the **Telegram** profile chip with your active rendered display name; both open your locally rendered profile card with its local photo, phone, usernames, bio, and personal channel without changing ownership data.
          - Grouped local profile settings, a name-color preview that follows the local display name, and fourteen platform-native app icon choices, including full-bleed macOS artwork without a duplicate white frame.
          - A bundled in-app update log plus IntelGram Telegram, GitHub, product changelog, and technical changelog links.
          - An optional supporter badge after you explicitly join `@intelgrams` through Telegram's normal channel page.

          ### Local-only boundary

          IntelGram does not update your Telegram name, photo, username, UID, phone, bio, emoji status, contacts, collectible ownership, or channel membership. Restrict Saving Content and self-destruct rules are preserved: protected message bodies and media never enter the vault, rules, exports, or backups.

          See the [complete feature list](https://github.com/foolspec/IntelGram/blob/main/FEATURES.md), [changelog](https://github.com/foolspec/IntelGram/blob/main/CHANGELOG.md), and [technical changelog](https://github.com/foolspec/IntelGram/blob/main/TECHNICAL_CHANGELOG.md).

          Local profile and collectible override features by **fool**.
          EOF
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --latest \
            --title "IntelGram v6.7.8 - Vault Suite" \
            --notes-file release-notes.md \
            "${RELEASE_ASSETS[@]}"
